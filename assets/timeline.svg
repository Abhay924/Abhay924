<svg viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code',monospace">
  <defs>
    <linearGradient id="tlBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050A"/>
      <stop offset="50%" stop-color="#0B0714"/>
      <stop offset="100%" stop-color="#05050A"/>
    </linearGradient>

    <linearGradient id="tlBus" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="tlFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="tlStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.12"/>
    </linearGradient>

    <filter id="tlGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="340" fill="url(#tlBg)"/>
  <rect x="0" y="8" width="1200" height="1.4" fill="url(#tlBus)">
    <animate attributeName="opacity" values="0.4;0.85;0.4" dur="3.2s" repeatCount="indefinite"/>
  </rect>
  <text x="600" y="34" font-size="12" letter-spacing="3" fill="#64748B" text-anchor="middle">ENGINEERING TIMELINE</text>

  <!-- base line: completed history -->
  <line x1="150" y1="160" x2="1050" y2="160" stroke="#A78BFA" stroke-opacity="0.4" stroke-width="2"/>
  <!-- dashed continuation past current year -->
  <line x1="1050" y1="160" x2="1150" y2="160" stroke="url(#tlFade)" stroke-width="2" stroke-dasharray="5 6"/>

  <!-- traveling progress marker -->
  <circle r="4" fill="#C4B5FD" filter="url(#tlGlow)">
    <animate attributeName="cx" values="150;1150" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="160;160" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- 2023 -->
  <g transform="translate(150,0)">
    <line x1="0" y1="160" x2="0" y2="195" stroke="#A78BFA" stroke-opacity="0.4" stroke-width="1.5"/>
    <circle cx="0" cy="160" r="8" fill="#A78BFA" filter="url(#tlGlow)"/>
    <text x="0" y="132" font-size="19" font-weight="700" fill="#F1F5F9" text-anchor="middle">2023</text>
    <rect x="-110" y="195" width="220" height="100" rx="12" fill="#FFFFFF" opacity="0.035"/>
    <rect x="-110" y="195" width="220" height="100" rx="12" fill="none" stroke="url(#tlStroke)" stroke-width="1"/>
    <text x="-90" y="225" font-size="12.5" fill="#94A3B8">
      <tspan x="-90" dy="0">Started learning</tspan>
      <tspan x="-90" dy="18">programming and</tspan>
      <tspan x="-90" dy="18">web development</tspan>
    </text>
  </g>

  <!-- 2024 -->
  <g transform="translate(450,0)">
    <line x1="0" y1="160" x2="0" y2="195" stroke="#A78BFA" stroke-opacity="0.4" stroke-width="1.5"/>
    <circle cx="0" cy="160" r="8" fill="#A78BFA" filter="url(#tlGlow)"/>
    <text x="0" y="132" font-size="19" font-weight="700" fill="#F1F5F9" text-anchor="middle">2024</text>
    <rect x="-110" y="195" width="220" height="100" rx="12" fill="#FFFFFF" opacity="0.035"/>
    <rect x="-110" y="195" width="220" height="100" rx="12" fill="none" stroke="url(#tlStroke)" stroke-width="1"/>
    <text x="-90" y="225" font-size="12.5" fill="#94A3B8">
      <tspan x="-90" dy="0">Built multiple frontend</tspan>
      <tspan x="-90" dy="18">and backend projects;</tspan>
      <tspan x="-90" dy="18">strengthened Java</tspan>
      <tspan x="-90" dy="18">fundamentals</tspan>
    </text>
  </g>

  <!-- 2025 -->
  <g transform="translate(750,0)">
    <line x1="0" y1="160" x2="0" y2="195" stroke="#A78BFA" stroke-opacity="0.4" stroke-width="1.5"/>
    <circle cx="0" cy="160" r="8" fill="#A78BFA" filter="url(#tlGlow)"/>
    <text x="0" y="132" font-size="19" font-weight="700" fill="#F1F5F9" text-anchor="middle">2025</text>
    <rect x="-110" y="195" width="220" height="100" rx="12" fill="#FFFFFF" opacity="0.035"/>
    <rect x="-110" y="195" width="220" height="100" rx="12" fill="none" stroke="url(#tlStroke)" stroke-width="1"/>
    <text x="-90" y="225" font-size="12.5" fill="#94A3B8">
      <tspan x="-90" dy="0">Began building</tspan>
      <tspan x="-90" dy="18">full-stack apps, AI</tspan>
      <tspan x="-90" dy="18">integrations, and</tspan>
      <tspan x="-90" dy="18">scalable backends</tspan>
    </text>
  </g>

  <!-- 2026 (in progress) -->
  <g transform="translate(1050,0)">
    <line x1="0" y1="160" x2="0" y2="195" stroke="#34D399" stroke-opacity="0.5" stroke-width="1.5"/>
    <circle cx="0" cy="160" r="12" fill="none" stroke="#34D399" stroke-width="1.5" opacity="0.5">
      <animate attributeName="r" values="12;20;12" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0;0.5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" cy="160" r="8" fill="#34D399" filter="url(#tlGlow)"/>
    <text x="0" y="132" font-size="19" font-weight="700" fill="#F1F5F9" text-anchor="middle">2026</text>
    <rect x="-110" y="195" width="220" height="110" rx="12" fill="#FFFFFF" opacity="0.035"/>
    <rect x="-110" y="195" width="220" height="110" rx="12" fill="none" stroke="#34D399" stroke-opacity="0.4" stroke-width="1"/>
    <g transform="translate(-92,210)">
      <circle cx="4" cy="-4" r="3.5" fill="#34D399">
        <animate attributeName="opacity" values="1;0.35;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <text x="14" y="0" font-size="10.5" letter-spacing="1" fill="#34D399">IN PROGRESS</text>
    </g>
    <text x="-90" y="235" font-size="12.5" fill="#94A3B8">
      <tspan x="-90" dy="0">CareerOS AI, the</tspan>
      <tspan x="-90" dy="18">microservices platform,</tspan>
      <tspan x="-90" dy="18">and Nexyra Systems —</tspan>
      <tspan x="-90" dy="18">while job hunting</tspan>
    </text>
  </g>
</svg>