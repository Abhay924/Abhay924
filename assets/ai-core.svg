<svg viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code',monospace">
  <defs>
    <linearGradient id="coreBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050A"/>
      <stop offset="60%" stop-color="#0B0714"/>
      <stop offset="100%" stop-color="#05050A"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4B5FD" stop-opacity="0.95"/>
      <stop offset="45%" stop-color="#A78BFA" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="panelStroke3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.15"/>
    </linearGradient>

    <filter id="coreBlur" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <filter id="nodeGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="480" height="480" rx="18" fill="url(#coreBg)"/>
  <rect width="480" height="480" rx="18" fill="none" stroke="url(#panelStroke3)" stroke-width="1.2"/>

  <circle cx="240" cy="240" r="200" fill="url(#ambientGlow)"/>

  <!-- ring 3 (outermost, slow) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 240 240" to="360 240 240" dur="22s" repeatCount="indefinite"/>
    <circle cx="240" cy="240" r="160" fill="none" stroke="#A78BFA" stroke-opacity="0.22" stroke-width="1" stroke-dasharray="2 8"/>
    <line x1="240" y1="240" x2="400" y2="240" stroke="#A78BFA" stroke-opacity="0.12" stroke-width="1"/>
    <line x1="240" y1="240" x2="240" y2="400" stroke="#A78BFA" stroke-opacity="0.12" stroke-width="1"/>
    <circle cx="400" cy="240" r="4.5" fill="#A78BFA" filter="url(#nodeGlow)"/>
    <circle cx="240" cy="80" r="4.5" fill="#A78BFA" filter="url(#nodeGlow)"/>
    <circle cx="80" cy="240" r="4.5" fill="#A78BFA" filter="url(#nodeGlow)"/>
    <circle cx="240" cy="400" r="4.5" fill="#A78BFA" filter="url(#nodeGlow)"/>
  </g>

  <!-- ring 2 (mid, opposite direction) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="360 240 240" to="0 240 240" dur="16s" repeatCount="indefinite"/>
    <circle cx="240" cy="240" r="120" fill="none" stroke="#38BDF8" stroke-opacity="0.28" stroke-width="1" stroke-dasharray="3 7"/>
    <line x1="240" y1="240" x2="324.85" y2="155.15" stroke="#38BDF8" stroke-opacity="0.15" stroke-width="1"/>
    <line x1="240" y1="240" x2="155.15" y2="324.85" stroke="#38BDF8" stroke-opacity="0.15" stroke-width="1"/>
    <circle cx="324.85" cy="155.15" r="4" fill="#38BDF8" filter="url(#nodeGlow)"/>
    <circle cx="155.15" cy="155.15" r="4" fill="#38BDF8" filter="url(#nodeGlow)"/>
    <circle cx="155.15" cy="324.85" r="4" fill="#38BDF8" filter="url(#nodeGlow)"/>
    <circle cx="324.85" cy="324.85" r="4" fill="#38BDF8" filter="url(#nodeGlow)"/>
  </g>

  <!-- ring 1 (inner, fast) -->
  <g>
    <animateTransform attributeName="transform" type="rotate" from="0 240 240" to="360 240 240" dur="10s" repeatCount="indefinite"/>
    <circle cx="240" cy="240" r="90" fill="none" stroke="#C4B5FD" stroke-opacity="0.35" stroke-width="1" stroke-dasharray="2 5"/>
    <circle cx="330" cy="240" r="3.5" fill="#C4B5FD" filter="url(#nodeGlow)"/>
    <circle cx="195" cy="317.9" r="3.5" fill="#C4B5FD" filter="url(#nodeGlow)"/>
    <circle cx="195" cy="162.1" r="3.5" fill="#C4B5FD" filter="url(#nodeGlow)"/>
  </g>

  <!-- pulsing core (on top, fixed) -->
  <circle cx="240" cy="240" r="46" fill="url(#coreGlow)" filter="url(#coreBlur)">
    <animate attributeName="r" values="42;50;42" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="240" cy="240" r="14" fill="#F5F3FF">
    <animate attributeName="opacity" values="0.85;1;0.85" dur="3.2s" repeatCount="indefinite"/>
  </circle>

  <!-- caption -->
  <text x="240" y="446" font-size="12" letter-spacing="2" fill="#94A3B8" text-anchor="middle">AI CORE</text>
  <g transform="translate(197,456)">
    <circle cx="0" cy="0" r="3.5" fill="#34D399">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <text x="10" y="4" font-size="10.5" letter-spacing="1" fill="#64748B">SYSTEM ONLINE</text>
  </g>
</svg>