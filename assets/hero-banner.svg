<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" font-family="'JetBrains Mono','Fira Code',monospace">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050A"/>
      <stop offset="45%" stop-color="#0D0818"/>
      <stop offset="100%" stop-color="#05050A"/>
    </linearGradient>

    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glowCyan" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="traceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="panelStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.2"/>
    </linearGradient>

    <filter id="blurSoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#A78BFA" stroke-width="0.4" opacity="0.22"/>
    </pattern>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>

  <!-- ambient glow orbs -->
  <circle cx="110" cy="50" r="140" fill="url(#glowPurple)" filter="url(#blurSoft)">
    <animate attributeName="r" values="140;162;140" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="255" r="150" fill="url(#glowCyan)" filter="url(#blurSoft)">
    <animate attributeName="r" values="150;172;150" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- circuit traces -->
  <path id="trace1" d="M -60 258 L 280 258 L 320 218 L 660 218 L 700 258 L 1260 258"
        fill="none" stroke="url(#traceGrad)" stroke-width="1.4" stroke-dasharray="5 11" opacity="0.55">
    <animate attributeName="stroke-dashoffset" from="0" to="-160" dur="4.2s" repeatCount="indefinite"/>
  </path>
  <path id="trace2" d="M -60 46 L 240 46 L 276 82 L 860 82 L 896 46 L 1260 46"
        fill="none" stroke="url(#traceGrad)" stroke-width="1.2" stroke-dasharray="4 10" opacity="0.4">
    <animate attributeName="stroke-dashoffset" from="0" to="-140" dur="5.4s" repeatCount="indefinite"/>
  </path>

  <!-- traveling packets -->
  <circle r="3.2" fill="#C4B5FD">
    <animateMotion dur="4.2s" repeatCount="indefinite">
      <mpath xlink:href="#trace1" href="#trace1"/>
    </animateMotion>
  </circle>
  <circle r="2.6" fill="#7DD3FC">
    <animateMotion dur="5.4s" repeatCount="indefinite">
      <mpath xlink:href="#trace2" href="#trace2"/>
    </animateMotion>
  </circle>

  <!-- scan line -->
  <rect x="0" y="0" width="1200" height="2" fill="#A78BFA" opacity="0.22">
    <animate attributeName="y" values="0;298;0" dur="9s" repeatCount="indefinite"/>
  </rect>

  <!-- glass terminal panel -->
  <rect x="60" y="62" width="600" height="176" rx="16" fill="#FFFFFF" opacity="0.035"/>
  <rect x="60" y="62" width="600" height="176" rx="16" fill="none" stroke="url(#panelStroke)" stroke-width="1.2"/>

  <!-- terminal dots -->
  <circle cx="86" cy="86" r="4.5" fill="#F87171" opacity="0.8"/>
  <circle cx="102" cy="86" r="4.5" fill="#FBBF24" opacity="0.8"/>
  <circle cx="118" cy="86" r="4.5" fill="#34D399" opacity="0.8"/>

  <text x="90" y="122" font-size="13" letter-spacing="1.5" fill="#38BDF8" opacity="0.9">$ whoami --init</text>
  <text x="90" y="160" font-size="32" font-weight="700" fill="#F1F5F9" filter="url(#softGlow)">ABHAY KUSHWAHA</text>
  <text x="90" y="188" font-size="14.5" fill="#94A3B8">Java Full-Stack Developer · Backend Engineer</text>
  <text x="90" y="208" font-size="14.5" fill="#94A3B8">System Design · Building CareerOS AI</text>

  <!-- blinking cursor -->
  <rect x="330" y="196" width="9" height="15" fill="#A78BFA">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.4;0.9;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- status chip -->
  <g transform="translate(900,86)">
    <rect width="240" height="34" rx="17" fill="#0D0818" stroke="#34D399" stroke-opacity="0.55"/>
    <circle cx="20" cy="17" r="5" fill="#34D399">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.7s" repeatCount="indefinite"/>
    </circle>
    <text x="36" y="22" font-size="12" letter-spacing="1" fill="#CBD5E1">STATUS: ACTIVE</text>
  </g>

  <!-- graduation chip -->
  <g transform="translate(900,132)">
    <rect width="240" height="34" rx="17" fill="#0D0818" stroke="#A78BFA" stroke-opacity="0.4"/>
    <text x="18" y="22" font-size="12" letter-spacing="1" fill="#CBD5E1">GRADUATING · 2027</text>
  </g>

  <!-- location tag -->
  <g transform="translate(900,178)">
    <rect width="240" height="34" rx="17" fill="#0D0818" stroke="#38BDF8" stroke-opacity="0.35"/>
    <text x="18" y="22" font-size="12" letter-spacing="1" fill="#CBD5E1">KANPUR, INDIA</text>
  </g>
</svg>