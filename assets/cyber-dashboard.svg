<svg viewBox="0 0 1200 150" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code',monospace">
  <defs>
    <linearGradient id="dbBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#05050A"/>
      <stop offset="50%" stop-color="#0B0714"/>
      <stop offset="100%" stop-color="#05050A"/>
    </linearGradient>

    <linearGradient id="busGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="panelStroke2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.15"/>
    </linearGradient>

    <pattern id="stripes" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="transparent"/>
      <rect width="4" height="10" fill="#A78BFA" opacity="0.5"/>
      <animateTransform attributeName="patternTransform" type="translate" from="0 0" to="10 0" dur="1.4s" repeatCount="indefinite" additive="sum"/>
    </pattern>

    <filter id="dotGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="150" fill="url(#dbBg)"/>

  <!-- top data bus line -->
  <rect x="0" y="6" width="1200" height="1.5" fill="url(#busGrad)" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- panel 1 : primary stack -->
  <g transform="translate(30,20)">
    <rect width="270" height="110" rx="14" fill="#FFFFFF" opacity="0.035"/>
    <rect width="270" height="110" rx="14" fill="none" stroke="url(#panelStroke2)" stroke-width="1"/>
    <text x="20" y="28" font-size="11" letter-spacing="1.5" fill="#38BDF8" opacity="0.85">PRIMARY STACK</text>

    <circle cx="26" cy="54" r="5" fill="#ED8B00" filter="url(#dotGlow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="40" y="59" font-size="13" fill="#E2E8F0">Java</text>

    <circle cx="26" cy="76" r="5" fill="#6DB33F" filter="url(#dotGlow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <text x="40" y="81" font-size="13" fill="#E2E8F0">Spring Boot</text>

    <circle cx="26" cy="98" r="5" fill="#61DAFB" filter="url(#dotGlow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="40" y="103" font-size="13" fill="#E2E8F0">React / Next.js</text>
  </g>

  <!-- panel 2 : project counts -->
  <g transform="translate(320,20)">
    <rect width="270" height="110" rx="14" fill="#FFFFFF" opacity="0.035"/>
    <rect width="270" height="110" rx="14" fill="none" stroke="url(#panelStroke2)" stroke-width="1"/>
    <text x="20" y="28" font-size="11" letter-spacing="1.5" fill="#38BDF8" opacity="0.85">PROJECTS</text>

    <text x="20" y="72" font-size="34" font-weight="700" fill="#F1F5F9">3</text>
    <text x="48" y="72" font-size="14" fill="#64748B">/ 5 total</text>
    <text x="20" y="94" font-size="12" fill="#94A3B8">currently active</text>

    <!-- progress ring: 3 of 5 = 60% -->
    <g transform="translate(220,58)">
      <circle r="26" fill="none" stroke="#1E293B" stroke-width="6"/>
      <circle r="26" fill="none" stroke="#A78BFA" stroke-width="6"
              stroke-dasharray="163.4" stroke-dashoffset="65.4" stroke-linecap="round"
              transform="rotate(-90)">
        <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="5" font-size="12" fill="#CBD5E1" text-anchor="middle">60%</text>
    </g>
  </g>

  <!-- panel 3 : current focus -->
  <g transform="translate(610,20)">
    <rect width="270" height="110" rx="14" fill="#FFFFFF" opacity="0.035"/>
    <rect width="270" height="110" rx="14" fill="none" stroke="url(#panelStroke2)" stroke-width="1"/>
    <text x="20" y="28" font-size="11" letter-spacing="1.5" fill="#38BDF8" opacity="0.85">CURRENT FOCUS</text>

    <text x="20" y="54" font-size="13" fill="#E2E8F0">System Design</text>
    <rect x="20" y="60" width="230" height="6" rx="3" fill="#1E293B"/>
    <rect x="20" y="60" width="230" height="6" rx="3" fill="url(#stripes)" clip-path="inset(0 round 3px)"/>

    <text x="20" y="86" font-size="13" fill="#E2E8F0">Cloud &amp; CI/CD</text>
    <rect x="20" y="92" width="230" height="6" rx="3" fill="#1E293B"/>
    <rect x="20" y="92" width="140" height="6" rx="3" fill="url(#stripes)" clip-path="inset(0 round 3px)"/>
  </g>

  <!-- panel 4 : currently shipping -->
  <g transform="translate(900,20)">
    <rect width="270" height="110" rx="14" fill="#FFFFFF" opacity="0.035"/>
    <rect width="270" height="110" rx="14" fill="none" stroke="url(#panelStroke2)" stroke-width="1"/>
    <text x="20" y="28" font-size="11" letter-spacing="1.5" fill="#38BDF8" opacity="0.85">CURRENTLY SHIPPING</text>

    <text x="20" y="60" font-size="17" font-weight="600" fill="#F1F5F9">CareerOS AI</text>
    <rect x="128" y="49" width="8" height="14" fill="#A78BFA">
      <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.4;0.9;1" dur="1.2s" repeatCount="indefinite"/>
    </rect>

    <text x="20" y="80" font-size="12" fill="#94A3B8">Fastify · PostgreSQL · Redis</text>

    <g transform="translate(20,92)">
      <circle cx="6" cy="0" r="4" fill="#34D399">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <text x="16" y="4" font-size="11" letter-spacing="1" fill="#94A3B8">ACTIVE DEVELOPMENT</text>
    </g>
  </g>
</svg>