<svg width="1000" height="150" viewBox="0 0 1000 150" fill="none" xmlns="http://www.w3.org/2000/svg">
    <style>
        .text-main { font-family: 'Inter', sans-serif; font-weight: 700; font-size: 24px; fill: #FFFFFF; }
        .text-sub { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 16px; fill: #A0AEC0; }
        
        .wave {
            animation: moveWave 10s linear infinite;
        }

        @keyframes moveWave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-1000px); }
        }
    </style>

    <rect width="1000" height="150" fill="#09090E" />

    <g opacity="0.3">
        <path class="wave" d="M0 100 Q 250 50 500 100 T 1000 100 T 1500 100 T 2000 100 V 150 H 0 Z" fill="#8A2BE2"/>
        <path class="wave" style="animation-duration: 7s; opacity: 0.5;" d="M0 120 Q 250 80 500 120 T 1000 120 T 1500 120 T 2000 120 V 150 H 0 Z" fill="#00F0FF"/>
    </g>

    <text x="500" y="60" text-anchor="middle" class="text-main">Thank You For Visiting!</text>
    <text x="500" y="90" text-anchor="middle" class="text-sub">Let's Connect | Made with ❤️ by Abhay Kushwaha</text>
</svg>
