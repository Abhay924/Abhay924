<svg viewBox="0 0 1200 400" xml:space="preserve" xmlns="http://www.w3.org/2000/svg" font-family="'JetBrains Mono','Fira Code',monospace">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05050A"/>
      <stop offset="50%" stop-color="#0B0714"/>
      <stop offset="100%" stop-color="#05050A"/>
    </linearGradient>

    <radialGradient id="termGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="termStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0.18"/>
    </linearGradient>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>

    <filter id="termBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="1200" height="400" fill="url(#termBg)"/>
  <circle cx="1080" cy="80" r="180" fill="url(#termGlow)" filter="url(#termBlur)"/>

  <!-- terminal window -->
  <rect x="40" y="40" width="1120" height="320" rx="14" fill="#08060F" opacity="0.9"/>
  <rect x="40" y="40" width="1120" height="320" rx="14" fill="none" stroke="url(#termStroke)" stroke-width="1.2"/>

  <!-- title bar -->
  <line x1="40" y1="86" x2="1160" y2="86" stroke="#1E1B2E" stroke-width="1"/>
  <circle cx="70" cy="63" r="6" fill="#F87171" opacity="0.85"/>
  <circle cx="90" cy="63" r="6" fill="#FBBF24" opacity="0.85"/>
  <circle cx="110" cy="63" r="6" fill="#34D399" opacity="0.85"/>
  <text x="600" y="68" font-size="12" fill="#64748B" text-anchor="middle" letter-spacing="1">zsh — abhay@dev:~</text>

  <!-- boot scan sweep (once) -->
  <rect x="40" y="86" width="1120" height="18" fill="url(#scanGrad)" opacity="0">
    <animate attributeName="y" from="90" to="345" dur="1.1s" begin="0s" fill="freeze"/>
    <animate attributeName="opacity" values="0;0.9;0" dur="1.1s" begin="0s" fill="freeze"/>
  </rect>

  <!-- output lines -->
  <text x="70" y="122" font-size="15" opacity="0">
    <tspan fill="#A78BFA">$ </tspan><tspan fill="#F1F5F9">whoami</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.35s" begin="0.3s" fill="freeze"/>
  </text>

  <text x="70" y="150" font-size="14" opacity="0">
    <tspan fill="#38BDF8" opacity="0.85">Name        : </tspan><tspan fill="#CBD5E1">Abhay Kushwaha</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.35s" begin="0.6s" fill="freeze"/>
  </text>

  <text x="70" y="176" font-size="14" opacity="0">
    <tspan fill="#38BDF8" opacity="0.85">Role        : </tspan><tspan fill="#CBD5E1">Software Engineer · Java Full Stack Developer · Backend Developer</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.35s" begin="0.9s" fill="freeze"/>
  </text>

  <text x="70" y="202" font-size="14" opacity="0">
    <tspan fill="#38BDF8" opacity="0.85">Status      : </tspan><tspan fill="#CBD5E1">Final Year B.Tech CSE Student (Graduating 2027)</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.35s" begin="1.2s" fill="freeze"/>
  </text>

  <text x="70" y="228" font-size="14" opacity="0">
    <tspan fill="#38BDF8" opacity="0.85">Location    : </tspan><tspan fill="#CBD5E1">Kanpur, Uttar Pradesh, India</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.35s" begin="1.5s" fill="freeze"/>
  </text>

  <text x="70" y="254" font-size="14" opacity="0">
    <tspan fill="#38BDF8" opacity="0.85">Focus       : </tspan><tspan fill="#CBD5E1">Backend Engineering · Spring Boot · System Design · AI Integration</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.35s" begin="1.8s" fill="freeze"/>
  </text>

  <text x="70" y="280" font-size="14" opacity="0">
    <tspan fill="#38BDF8" opacity="0.85">Mission     : </tspan><tspan fill="#CBD5E1">Building scalable backend systems, modern web apps, and</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.35s" begin="2.1s" fill="freeze"/>
  </text>

  <text x="70" y="302" font-size="14" opacity="0">
    <tspan fill="#CBD5E1">              AI-powered software with clean architecture.</tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.35s" begin="2.3s" fill="freeze"/>
  </text>

  <!-- next prompt line with persistent blinking cursor -->
  <text x="70" y="336" font-size="15" opacity="0">
    <tspan fill="#A78BFA">$ </tspan>
    <animate attributeName="opacity" from="0" to="1" dur="0.35s" begin="2.6s" fill="freeze"/>
  </text>
  <rect x="90" y="324" width="9" height="16" fill="#A78BFA" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.01;0.02;0.5;0.51" dur="1s" begin="2.6s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="1s" begin="3.6s" repeatCount="indefinite"/>
  </rect>
</svg>